name: NodeArmor Supply Chain Gate

on:
  workflow_dispatch:
    inputs:
      scenario:
        description: 'Scenario'
        required: false
        default: 'pass'
        type: choice
        options:
          - pass
          - block

permissions:
  contents: write

jobs:
  supply-chain-gate:
    runs-on: ubuntu-latest
    name: Supply Chain Enforcement

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Verify build provenance
        run: |
          echo "::group::Build provenance"
          echo "Repository  : ${{ github.repository }}"
          echo "Triggered by: ${{ github.actor }}"
          echo "Ref         : ${{ github.ref }}"
          echo "Commit SHA  : $(git rev-parse HEAD)"
          echo "Commit msg  : $(git log -1 --pretty=%s)"
          echo "Committed   : $(git log -1 --pretty=%ci)"
          echo ""
          echo "Provenance chain: authenticated GitHub Actions runner"
          echo "Runner identity : ${{ runner.name }} / ${{ runner.os }}"
          echo "::endgroup::"

      - name: SBOM generation and CVE scan (Google OSV)
        id: sbom
        run: |
          echo "::group::SBOM scan — Google OSV (api.osv.dev)"

          if [ "${{ github.event.inputs.scenario }}" = "block" ]; then
            PKG_NAME="Pillow"
            PKG_VERSION="8.1.0"
            PKG_ECOSYSTEM="PyPI"
          else
            PKG_NAME="httpx"
            PKG_VERSION="0.27.0"
            PKG_ECOSYSTEM="PyPI"
          fi

          echo "Package under scan : ${PKG_NAME}==${PKG_VERSION}"
          echo "Ecosystem          : ${PKG_ECOSYSTEM}"
          echo "CVE source         : Google OSV  —  https://api.osv.dev/v1/query"
          echo ""

          RESPONSE=$(curl -sf -X POST "https://api.osv.dev/v1/query" \
            -H "Content-Type: application/json" \
            -d "{\"package\":{\"name\":\"${PKG_NAME}\",\"ecosystem\":\"${PKG_ECOSYSTEM}\"},\"version\":\"${PKG_VERSION}\"}")

          CVE_COUNT=$(echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(len(d.get('vulns',[])))")
          echo "OSV query returned ${CVE_COUNT} known vulnerabilities"
          echo ""

          if [ "$CVE_COUNT" -gt "0" ]; then
            echo "Vulnerability summary (first 5 of ${CVE_COUNT}):"
            echo "$RESPONSE" | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          for v in d.get('vulns', [])[:5]:
              cve = next((a for a in v.get('aliases', []) if a.startswith('CVE-')), '')
              line = f'  {v[\"id\"]:35s}  {cve:20s}  {v.get(\"summary\",\"\")[:50]}'
              print(line)
          "
          else
            echo "  No vulnerabilities found in OSV database for ${PKG_NAME}==${PKG_VERSION}"
          fi

          echo ""
          echo "pkg_name=${PKG_NAME}"       >> "$GITHUB_OUTPUT"
          echo "pkg_version=${PKG_VERSION}" >> "$GITHUB_OUTPUT"
          echo "cve_count=${CVE_COUNT}"     >> "$GITHUB_OUTPUT"
          echo "::endgroup::"

      - name: Signature and provenance policy check
        run: |
          echo "::group::Signature policy"
          echo "Policy source: .nodearmor/config.yaml"
          cat .nodearmor/config.yaml 2>/dev/null || echo "(no config.yaml found)"
          echo ""
          echo "In production this step invokes cosign/Sigstore to verify every"
          echo "artifact is signed against a pinned key before promotion."
          echo "This run enforces the CVE gate (step above) per that policy."
          echo "::endgroup::"

      - name: Run NodeArmor enforcement gate
        id: gate
        run: |
          echo "::group::NodeArmor enforcement gate — NIST SP 800-207"

          CVE_COUNT="${{ steps.sbom.outputs.cve_count }}"
          PKG="${{ steps.sbom.outputs.pkg_name }}==${{ steps.sbom.outputs.pkg_version }}"

          echo "Package evaluated : ${PKG}"
          echo "CVEs from OSV     : ${CVE_COUNT}"
          echo "Policy            : .nodearmor/config.yaml (NIST SP 800-207 Zero Trust)"
          echo ""

          if [ "${{ github.event.inputs.scenario }}" = "block" ] && [ "${CVE_COUNT}" -gt "0" ]; then
            echo "================================================================"
            echo "NODEARMOR ENFORCEMENT GATE: BLOCKED"
            echo "Package : ${PKG}"
            echo "CVEs    : ${CVE_COUNT} known vulnerabilities (source: Google OSV)"
            echo "Policy  : Zero Trust — no unresolved CVEs permitted on main branch"
            echo "Action  : Merge halted. Event logged to .nodearmor/events.json."
            echo "================================================================"
            echo "verdict=BLOCK"          >> "$GITHUB_OUTPUT"
            echo "violation=CVE_CRITICAL" >> "$GITHUB_OUTPUT"
            echo "pkg=${PKG}"             >> "$GITHUB_OUTPUT"
            echo "deception=false"        >> "$GITHUB_OUTPUT"
            exit 1
          else
            echo "================================================================"
            echo "NODEARMOR ENFORCEMENT GATE: PASSED"
            echo "Package : ${PKG}"
            echo "CVEs    : ${CVE_COUNT}"
            echo "Policy  : All Zero Trust requirements satisfied"
            echo "Action  : Merge authorized."
            echo "================================================================"
            echo "verdict=PASS"    >> "$GITHUB_OUTPUT"
            echo "violation=NONE"  >> "$GITHUB_OUTPUT"
            echo "pkg=${PKG}"      >> "$GITHUB_OUTPUT"
            echo "deception=false" >> "$GITHUB_OUTPUT"
          fi
          echo "::endgroup::"

      - name: Log enforcement event to audit trail
        if: always()
        env:
          GATE_VERDICT:   ${{ steps.gate.outputs.verdict }}
          GATE_VIOLATION: ${{ steps.gate.outputs.violation }}
          GATE_PKG:       ${{ steps.gate.outputs.pkg }}
          GATE_DECEPTION: ${{ steps.gate.outputs.deception }}
        run: |
          python3 /dev/stdin << 'PYEOF'
          import json, os, datetime

          events_path = ".nodearmor/events.json"
          timestamp   = datetime.datetime.utcnow().strftime("%Y-%m-%dT%H:%M:%SZ")
          run_id      = os.environ.get("GITHUB_RUN_ID", "unknown")

          if os.path.exists(events_path):
              with open(events_path) as f:
                  data = json.load(f)
          else:
              data = {"events": [], "total": 0, "blocked_total": 0, "last_updated": timestamp}

          events  = data.get("events", [])
          next_id = len(events) + 1

          verdict   = os.environ.get("GATE_VERDICT",   "PASS")
          violation = os.environ.get("GATE_VIOLATION", "NONE")
          pkg       = os.environ.get("GATE_PKG",       "unknown")
          deception = os.environ.get("GATE_DECEPTION", "false").lower() == "true"

          new_event = {
              "event_id":  f"EVT-{next_id:04d}",
              "timestamp": timestamp,
              "pkg":       pkg,
              "violation": violation,
              "verdict":   verdict,
              "deception": deception,
              "scenario":  "block" if verdict == "BLOCK" else "pass",
              "run_id":    run_id,
          }
          events.append(new_event)

          data["events"]        = events
          data["total"]         = len(events)
          data["blocked_total"] = sum(1 for e in events if e["verdict"] == "BLOCK")
          data["last_updated"]  = timestamp

          os.makedirs(".nodearmor", exist_ok=True)
          with open(events_path, "w") as f:
              json.dump(data, f, indent=2)

          print(f"Logged {new_event['event_id']}: {verdict} | {violation} | {pkg}")
          PYEOF

      - name: Commit and push audit log
        if: always()
        run: |
          git config user.name  "NodeArmor Gate"
          git config user.email "gate@nodearmor.dev"
          git add .nodearmor/events.json
          git diff --staged --quiet || git commit -m "gate: log enforcement event $(date -u +%Y%m%dT%H%M%S) [skip ci]"
          git push origin HEAD:main
