name: NodeArmor Supply Chain Gate

on:
  workflow_dispatch:
    inputs:
      scenario:
        description: 'Scenario'
        required: false
        default: 'pass'
        type: choice
        options:
          - pass
          - block

permissions:
  contents: write

jobs:
  supply-chain-gate:
    runs-on: ubuntu-latest
    name: Supply Chain Enforcement

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Verify build provenance
        run: |
          echo "::group::Provenance check"
          echo "Verifying artifact provenance against trusted certificate authority..."
          echo "Certificate chain: VALID"
          echo "Build server fingerprint: MATCHES KNOWN GOOD"
          echo "Provenance: VERIFIED"
          echo "::endgroup::"

      - name: SBOM generation and scan
        run: |
          echo "::group::SBOM scan"
          pip install cyclonedx-bom 2>/dev/null | tail -1
          echo "Generating Software Bill of Materials..."
          echo "Components inventoried: 47"
          echo "Registry cross-check: authorized registries only"
          echo "SBOM: COMPLETE"
          echo "::endgroup::"

      - name: Signature verification
        run: |
          echo "::group::Signature verification"
          echo "Verifying artifact signatures (Sigstore / cosign)..."
          echo "Signatures: ALL VALID"
          echo "Key transparency log: entry confirmed"
          echo "::endgroup::"

      - name: Run NodeArmor enforcement gate
        id: gate
        run: |
          echo "::group::NodeArmor enforcement gate"
          if [ "${{ github.event.inputs.scenario }}" = "block" ]; then
            echo "Scanning dependency manifest..."
            echo "ALERT: Unauthorized registry detected -- custom-pypi.attacker.io"
            echo "ALERT: Package signature mismatch -- requests@2.28.0"
            echo "ALERT: SBOM entry not in authorized component list"
            echo ""
            echo "================================================================"
            echo "NODEARMOR ENFORCEMENT GATE: BLOCKED"
            echo "Policy: NIST SP 800-207 Zero Trust"
            echo "Reason: Unauthorized registry + signature mismatch"
            echo "Action: Build halted. CISO notified. Incident logged."
            echo "================================================================"
            echo "::endgroup::"
            echo "verdict=BLOCK" >> $GITHUB_OUTPUT
            echo "violation=HASH_MISMATCH" >> $GITHUB_OUTPUT
            echo "pkg=requests==2.28.0" >> $GITHUB_OUTPUT
            echo "deception=true" >> $GITHUB_OUTPUT
            exit 1
          else
            echo "Scanning dependency manifest..."
            echo "All 47 packages verified against authorized registries"
            echo "All signatures valid and traceable to trusted roots"
            echo "SBOM: complete coverage confirmed"
            echo ""
            echo "================================================================"
            echo "NODEARMOR ENFORCEMENT GATE: PASSED"
            echo "Build authorized for deployment"
            echo "Zero Trust policy: satisfied"
            echo "================================================================"
            echo "::endgroup::"
            echo "verdict=PASS" >> $GITHUB_OUTPUT
            echo "violation=NONE" >> $GITHUB_OUTPUT
            echo "pkg=all-47-packages" >> $GITHUB_OUTPUT
            echo "deception=false" >> $GITHUB_OUTPUT
          fi

      - name: Log enforcement event to audit trail
        if: always()
        env:
          GATE_VERDICT:   ${{ steps.gate.outputs.verdict }}
          GATE_VIOLATION: ${{ steps.gate.outputs.violation }}
          GATE_PKG:       ${{ steps.gate.outputs.pkg }}
          GATE_DECEPTION: ${{ steps.gate.outputs.deception }}
        run: |
          python3 /dev/stdin << 'PYEOF'
          import json, os, datetime

          events_path = ".nodearmor/events.json"
          timestamp   = datetime.datetime.utcnow().strftime("%Y-%m-%dT%H:%M:%SZ")
          run_id      = os.environ.get("GITHUB_RUN_ID", "unknown")

          if os.path.exists(events_path):
              with open(events_path) as f:
                  data = json.load(f)
          else:
              data = {"events": [], "total": 0, "blocked_total": 0, "last_updated": timestamp}

          events  = data.get("events", [])
          next_id = len(events) + 1

          verdict   = os.environ.get("GATE_VERDICT",   "PASS")
          violation = os.environ.get("GATE_VIOLATION", "NONE")
          pkg       = os.environ.get("GATE_PKG",       "all-47-packages")
          deception = os.environ.get("GATE_DECEPTION", "false").lower() == "true"

          new_event = {
              "event_id":  f"EVT-{next_id:04d}",
              "timestamp": timestamp,
              "pkg":       pkg,
              "violation": violation,
              "verdict":   verdict,
              "deception": deception,
              "scenario":  "block" if verdict == "BLOCK" else "pass",
              "run_id":    run_id,
          }
          events.append(new_event)

          data["events"]        = events
          data["total"]         = len(events)
          data["blocked_total"] = sum(1 for e in events if e["verdict"] == "BLOCK")
          data["last_updated"]  = timestamp

          os.makedirs(".nodearmor", exist_ok=True)
          with open(events_path, "w") as f:
              json.dump(data, f, indent=2)

          print(f"Logged {new_event['event_id']}: {verdict} | {violation} | {pkg}")
          PYEOF

      - name: Commit and push audit log
        if: always()
        run: |
          git config user.name  "NodeArmor Gate"
          git config user.email "gate@nodearmor.dev"
          git add .nodearmor/events.json
          git diff --staged --quiet || git commit -m "gate: log enforcement event $(date -u +%Y%m%d%H%M%S) [skip ci]"
          git push origin HEAD:main
